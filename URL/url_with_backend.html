<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>URL Shortener</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #101820;
    color: #f0f0f0;
    margin: 0;
    padding: 0 20px;
  }
  header {
    text-align: center;
    padding: 30px 0 20px;
  }
  header h1 {
    color: #856c4b;
    font-size: 2.8rem;
    margin-bottom: 5px;
  }
  header p {
    color: #aaa;
    font-size: 1.1rem;
  }

  main {
    max-width: 700px;
    margin: auto;
    background: #1d252e;
    padding: 25px 30px;
    border-radius: 10px;
    box-shadow: 0 0 15px #f2aa4cdd;
  }

  label {
    display: block;
    font-weight: 700;
    margin-bottom: 10px;
  }

  input[type="url"] {
    width: 100%;
    padding: 12px;
    border-radius: 6px;
    border: none;
    font-size: 1rem;
    outline: none;
    margin-bottom: 20px;
    box-sizing: border-box;
  }

  button {
    background: #f2aa4c;
    color: #101820;
    border: none;
    padding: 12px 25px;
    border-radius: 30px;
    font-weight: 700;
    font-size: 1.1rem;
    cursor: pointer;
    transition: background 0.3s ease;
  }
  button:hover {
    background: #d08b38;
  }
  button:disabled {
    background: #666;
    cursor: not-allowed;
  }

  .status-message {
    margin-bottom: 15px;
    padding: 12px;
    border-radius: 6px;
    display: none;
  }
  .status-message.success {
    background: #2d5f3f;
    color: #90ee90;
    display: block;
  }
  .status-message.error {
    background: #5f2d2d;
    color: #ff6b6b;
    display: block;
  }

  .shortened-list {
    margin-top: 30px;
  }
  .item {
    background: #0b1218;
    border-radius: 8px;
    padding: 15px 20px;
    margin-bottom: 15px;
    box-shadow: 0 0 10px #f2aa4c88;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
  }
  .urls {
    flex: 1 1 60%;
    margin-bottom: 8px;
    font-size: 0.95rem;
    word-break: break-word;
  }
  .urls span {
    display: block;
  }
  .short-url {
    color: #f2aa4c;
    cursor: pointer;
    font-weight: 700;
    text-decoration: underline;
  }
  .short-url:hover {
    color: #ffb84d;
  }

  .clicks {
    flex: 1 1 20%;
    text-align: right;
    font-size: 0.9rem;
    color: #bbb;
  }

  .actions {
    flex: 1 1 20%;
    text-align: right;
  }
  .delete-btn {
    background: #ff6b6b;
    color: white;
    border: none;
    padding: 8px 15px;
    border-radius: 20px;
    font-size: 0.9rem;
    cursor: pointer;
    transition: background 0.3s ease;
  }
  .delete-btn:hover {
    background: #ee5a52;
  }

  footer {
    text-align: center;
    padding: 20px 10px;
    font-size: 0.9rem;
    color: #555;
    margin-top: 40px;
    user-select:none;
  }

  .loading {
    display: inline-block;
    width: 12px;
    height: 12px;
    background: #f2aa4c;
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  @media (max-width: 500px) {
    .item {
      flex-direction: column;
      align-items: flex-start;
    }
    .clicks {
      text-align: left;
      margin-top: 8px;
    }
    .actions {
      width: 100%;
      text-align: left;
      margin-top: 8px;
    }
  }
</style>
</head>
<body>

<header>
  <h1>URL Shortener</h1>
  <p>Enter a long URL to generate a short link you can share!</p>
</header>

<main>
  <div id="status-message" class="status-message"></div>
  
  <form id="shorten-form">
    <label for="long-url">Long URL</label>
    <input
      type="url"
      id="long-url"
      name="long-url"
      placeholder="https://example.com/some/very/long/url"
      required
      pattern="https?://.+"
      title="Please enter a valid URL starting with http:// or https://"
    />
    <button type="submit" id="submit-btn">Shorten URL</button>
  </form>

  <div class="shortened-list" id="shortened-list">
    
  </div>
</main>

<footer>
  &copy; 2025 Simple URL Shortener with Python Backend.
</footer>

<script>
  // Configuration
  const BACKEND_URL = 'https://url-app.onrender.com';

  // State
  let urlMappings = {};

  // Helper functions
  function showMessage(message, type = 'success') {
    const statusDiv = document.getElementById('status-message');
    statusDiv.textContent = message;
    statusDiv.className = `status-message ${type}`;
    setTimeout(() => {
      statusDiv.className = 'status-message';
    }, 4000);
  }

  async function fetchAllUrls() {
    try {
      const response = await fetch(`${BACKEND_URL}/api/urls`);
      if (response.ok) {
        const urls = await response.json();
        urlMappings = {};
        urls.forEach(url => {
          urlMappings[url.short_code] = {
            longUrl: url.long_url,
            clicks: url.clicks,
            shortUrl: url.short_url
          };
        });
        renderList();
      }
    } catch (error) {
      console.error('Error fetching URLs:', error);
      showMessage('Error connecting to backend', 'error');
    }
  }

  function renderList() {
    const container = document.getElementById('shortened-list');
    container.innerHTML = '';

    if (Object.keys(urlMappings).length === 0) {
      container.innerHTML = '<p style="text-align:center; color:#bbb; margin-top: 30px;">No URLs shortened yet.</p>';
      return;
    }

    Object.entries(urlMappings).forEach(([code, data]) => {
      const item = document.createElement('div');
      item.className = 'item';

      const urlsDiv = document.createElement('div');
      urlsDiv.className = 'urls';
      urlsDiv.innerHTML = `<span><strong>Original:</strong> ${data.longUrl}</span>
                           <span><strong>Short:</strong> <span class="short-url" title="Click to copy or visit" data-code="${code}">${data.shortUrl}</span></span>`;

      const clicksDiv = document.createElement('div');
      clicksDiv.className = 'clicks';
      clicksDiv.textContent = `Clicks: ${data.clicks}`;

      const actionsDiv = document.createElement('div');
      actionsDiv.className = 'actions';
      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'delete-btn';
      deleteBtn.textContent = 'Delete';
      deleteBtn.onclick = (e) => {
        e.preventDefault();
        deleteUrl(code);
      };
      actionsDiv.appendChild(deleteBtn);

      item.appendChild(urlsDiv);
      item.appendChild(clicksDiv);
      item.appendChild(actionsDiv);
      container.appendChild(item);
    });

    // Add event listeners to short URLs
    document.querySelectorAll('.short-url').forEach(el => {
      el.addEventListener('click', () => {
        const code = el.getAttribute('data-code');
        const shortUrl = urlMappings[code].shortUrl;
        navigator.clipboard.writeText(shortUrl);
        showMessage('Short URL copied to clipboard!', 'success');
      });
    });
  }

  async function shortenUrl(longUrl) {
    try {
      const submitBtn = document.getElementById('submit-btn');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="loading"></span> Shortening...';

      const response = await fetch(`${BACKEND_URL}/api/shorten`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ long_url: longUrl })
      });

      const data = await response.json();

      if (response.ok) {
        urlMappings[data.short_code] = {
          longUrl: data.long_url,
          clicks: data.clicks,
          shortUrl: data.short_url
        };
        renderList();
        showMessage('URL shortened successfully!', 'success');
      } else {
        showMessage(data.error || 'Error shortening URL', 'error');
      }
    } catch (error) {
      console.error('Error:', error);
      showMessage('Error connecting to backend. Make sure the server is running.', 'error');
    } finally {
      const submitBtn = document.getElementById('submit-btn');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Shorten URL';
    }
  }

  async function deleteUrl(code) {
    if (!confirm('Are you sure you want to delete this URL?')) return;

    try {
      const response = await fetch(`${BACKEND_URL}/api/url/${code}`, {
        method: 'DELETE'
      });

      if (response.ok) {
        delete urlMappings[code];
        renderList();
        showMessage('URL deleted successfully', 'success');
      } else {
        showMessage('Error deleting URL', 'error');
      }
    } catch (error) {
      console.error('Error:', error);
      showMessage('Error connecting to backend', 'error');
    }
  }

  // Event listeners
  document.getElementById('shorten-form').addEventListener('submit', event => {
    event.preventDefault();
    const longUrlInput = document.getElementById('long-url');
    const longUrl = longUrlInput.value.trim();

    if (!longUrl) {
      showMessage('Please enter a valid URL', 'error');
      return;
    }

    shortenUrl(longUrl);
    longUrlInput.value = '';
  });

  // Load URLs on page load
  window.addEventListener('load', fetchAllUrls);

  // Refresh URLs every 10 seconds
  setInterval(fetchAllUrls, 10000);
</script>
</body>
</html>
